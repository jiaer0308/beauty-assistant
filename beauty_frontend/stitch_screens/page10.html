<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Playfair+Display:wght@700&amp;family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f3c382",
                        "background-light": "#faf8f5",
                        "background-dark": "#211a11",
                        "oatmeal": "#d4caba",
                        "deep-taupe": "#4a4138",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "Manrope", "sans-serif"],
                        "serif": ["Playfair Display", "serif"],
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .font-plus-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-playfair { font-family: 'Playfair Display', serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-deep-taupe selection:bg-primary/30">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto overflow-x-hidden shadow-2xl bg-background-light">
<!-- Header -->
<header class="flex flex-col pt-4 px-6 gap-2">
<div class="flex items-center -ml-2 py-2">
<div class="text-deep-taupe flex size-10 shrink-0 items-center justify-center cursor-pointer rounded-full hover:bg-black/5">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
</div>
<div class="flex flex-col gap-3">
<p class="text-deep-taupe text-[11px] font-bold leading-none tracking-widest uppercase font-plus-jakarta opacity-80">STEP 8 OF 9</p>
<!-- Segmented Progress Bar -->
<div class="flex gap-1.5 w-full h-1.5">
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-oatmeal rounded-full"></div>
</div>
</div>
</header>
<!-- Body Content -->
<main class="flex flex-col px-6 pt-10 pb-24">
<h1 class="text-deep-taupe font-playfair text-[34px] font-bold leading-tight mb-3">
                What are your primary skin concerns?
            </h1>
<p class="text-deep-taupe/70 font-plus-jakarta text-base font-normal leading-normal mb-10">
                Choose as many as you like.
            </p>
<!-- Choice Chips Wrap Layout -->
<div class="flex flex-wrap gap-3">
<!-- Selected Chips -->
<button class="bg-primary px-5 py-2.5 rounded-full text-deep-taupe font-plus-jakarta text-sm font-semibold shadow-sm border-0">
                    Dark Circles
                </button>
<button class="bg-primary px-5 py-2.5 rounded-full text-deep-taupe font-plus-jakarta text-sm font-semibold shadow-sm border-0">
                    Redness/Acne
                </button>
<!-- Unselected Chips -->
<button class="bg-white px-5 py-2.5 rounded-full text-deep-taupe font-plus-jakarta text-sm font-medium border border-oatmeal hover:bg-white/80 transition-colors">
                    Dullness
                </button>
<button class="bg-white px-5 py-2.5 rounded-full text-deep-taupe font-plus-jakarta text-sm font-medium border border-oatmeal hover:bg-white/80 transition-colors">
                    Large Pores
                </button>
<button class="bg-white px-5 py-2.5 rounded-full text-deep-taupe font-plus-jakarta text-sm font-medium border border-oatmeal hover:bg-white/80 transition-colors">
                    Fine Lines
                </button>
<button class="bg-white px-5 py-2.5 rounded-full text-deep-taupe font-plus-jakarta text-sm font-medium border border-oatmeal hover:bg-white/80 transition-colors">
                    Pigmentation
                </button>
<button class="bg-white px-5 py-2.5 rounded-full text-deep-taupe font-plus-jakarta text-sm font-medium border border-oatmeal hover:bg-white/80 transition-colors">
                    Dryness
                </button>
<button class="bg-white px-5 py-2.5 rounded-full text-deep-taupe font-plus-jakarta text-sm font-medium border border-oatmeal hover:bg-white/80 transition-colors">
                    Oiliness
                </button>
</div>
</main>
<!-- Footer -->
<footer class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-background-light p-6 pt-2">
<button class="w-full bg-primary hover:bg-primary/90 text-deep-taupe font-plus-jakarta text-base font-bold py-4 rounded-full transition-all shadow-md active:scale-[0.98]">
                Next
            </button>
<!-- Android Navigation Bar Hint -->
<div class="mt-4 flex justify-center">
<div class="h-1.5 w-32 bg-deep-taupe/10 rounded-full"></div>
</div>
</footer>
</div>
</body></html>
